<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GABRIELA'S FINANCE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --emerald: #059669;
  --emerald-light: #34d399;
  --emerald-dark: #064e3b;
  --accent: #10b981;
  --dark: #051a10;
  --teal: #2dd4bf;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --yellow: #fbbf24;
  --gold: #f59e0b;
  --blue: #60a5fa;
  --purple: #a78bfa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
  color: #fff;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(5,150,105,0.4) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(16,185,129,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 10%, rgba(45,212,191,0.1) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}
.app {
  position: relative; z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── HEADER ────────────────────────────────────── */
header { text-align: center; margin-bottom: 48px; }
.date-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent);
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.3);
  padding: 6px 16px; border-radius: 20px; margin-bottom: 16px;
}
.header-title-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(1.8rem, 4.5vw, 3rem);
  font-weight: 700;
  background: linear-gradient(135deg, #fff 30%, var(--emerald-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.15;
}
.global-balance { display: flex; align-items: center; gap: 10px; }
.balance-chip {
  font-family: 'DM Sans', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  padding: 6px 16px; border-radius: 30px;
  border: 1.5px solid rgba(52,211,153,0.4);
  background: rgba(5,150,105,0.12);
  color: var(--emerald-light); white-space: nowrap; transition: all 0.3s;
}
.balance-chip.negative { color: var(--red); border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
.global-mov-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid rgba(52,211,153,0.3);
  background: rgba(52,211,153,0.08); color: var(--emerald-light);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.global-mov-btn:hover { background: rgba(52,211,153,0.2); transform: scale(1.08); }
.subtitle { color: rgba(255,255,255,0.38); font-size: 0.9rem; font-weight: 300; }

/* ── LAYOUT CONTROLS ────────────────────────────── */
.layout-controls {
  display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 14px;
}
.layout-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4); border-radius: 9px; padding: 5px 12px;
  font-size: 0.72rem; cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; gap: 5px;
}
.layout-btn:hover, .layout-btn.active { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.3); color: var(--emerald-light); }

/* ── GRIDS ─────────────────────────────────────── */
.triple-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px; margin-bottom: 20px;
  transition: all 0.3s;
}
.triple-grid.layout-2col { grid-template-columns: 1fr 1fr; }
.triple-grid.layout-1col { grid-template-columns: 1fr; }
@media (max-width: 900px) { .triple-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 580px) { .triple-grid { grid-template-columns: 1fr; } }

/* ── SECTION BASE ──────────────────────────────── */
.section {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(16,185,129,0.18);
  border-radius: 20px; padding: 22px;
  backdrop-filter: blur(14px);
  transition: border-color 0.3s;
  display: flex; flex-direction: column;
}
.section:hover { border-color: rgba(52,211,153,0.35); }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.section-icon {
  width: 36px; height: 36px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.sec-accounts .section-icon { background: linear-gradient(135deg,#065f46,#10b981); }
.sec-payments .section-icon { background: linear-gradient(135deg,#064e3b,#059669); }
.sec-muerte   .section-icon { background: linear-gradient(135deg,#7f1d1d,#ef4444); }
.sec-goals    .section-icon { background: linear-gradient(135deg,#1e3a5f,#3b82f6); }
.sec-debts    .section-icon { background: linear-gradient(135deg,#4c1d95,#8b5cf6); }
.section-title { font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; flex: 1; }
.sec-muerte .section-title { color: var(--red); }
.section-count {
  font-size: 10px; font-weight: 500;
  color: var(--emerald-light); background: rgba(52,211,153,0.12);
  padding: 3px 9px; border-radius: 10px; white-space: nowrap;
}
.sec-muerte .section-count { color: var(--red); background: rgba(248,113,113,0.12); }
.sec-goals  .section-count { color: var(--blue); background: rgba(96,165,250,0.12); }
.sec-debts  .section-count { color: var(--purple); background: rgba(167,139,250,0.12); }

/* Section total row */
.section-total-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; padding: 6px 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
  gap: 8px; flex-wrap: wrap;
}
.section-total-label { font-size: 0.65rem; color: rgba(255,255,255,0.32); text-transform: uppercase; letter-spacing: 1px; }
.section-total-val { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; }
.stv-pay   { color: var(--red); }
.stv-goals { color: var(--blue); }
.stv-debts { color: var(--purple); }
.stv-acc   { color: var(--teal); }
.sec-mov-btn {
  font-size: 11px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.38);
  border-radius: 8px; padding: 3px 9px; cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.sec-mov-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* Progress */
.progress-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--emerald),var(--teal)); border-radius: 2px; transition: width .4s; }
.progress-fill-blue   { background: linear-gradient(90deg,#2563eb,#60a5fa); }
.progress-fill-purple { background: linear-gradient(90deg,#7c3aed,#a78bfa); }

/* ── ITEM LIST ─────────────────────────────────── */
.item-list { list-style: none; display: flex; flex-direction: column; gap: 9px; min-height: 36px; margin-bottom: 14px; flex: 1; }

@keyframes slideIn {
  from { opacity:0; transform:translateY(-5px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeOutShrink {
  0%   { opacity:.6; max-height:300px; margin-bottom:9px; }
  70%  { opacity:0; max-height:300px; }
  100% { opacity:0; max-height:0; margin-bottom:0; padding:0; border:none; }
}
.fin-item {
  border: 1px solid rgba(52,211,153,0.13); border-radius: 13px;
  background: rgba(255,255,255,0.035); transition: all .22s;
  animation: slideIn .28s ease; overflow: hidden;
}
.fin-item.completed  { border-color: rgba(74,222,128,0.25); background: rgba(74,222,128,0.04); opacity:.6; }
.fin-item.fixed-item { border-color: rgba(245,158,11,0.3); }
.fin-item.goal-item  { border-color: rgba(96,165,250,0.18); background: rgba(96,165,250,0.03); }
.fin-item.debt-item  { border-color: rgba(167,139,250,0.18); background: rgba(167,139,250,0.03); }
.fin-item.account-item { border-color: rgba(45,212,191,0.22); background: rgba(45,212,191,0.04); }
.fin-item.deleting   { animation: fadeOutShrink .9s ease forwards; pointer-events:none; }

@keyframes urgentPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
  50%      { box-shadow: 0 0 10px 2px rgba(248,113,113,0.22); }
}
.muerte-item {
  border-color: rgba(248,113,113,0.45) !important;
  background: rgba(248,113,113,0.06) !important;
  animation: urgentPulse 2s ease-in-out infinite !important;
}

/* Item inner */
.item-main { display:flex; align-items:flex-start; gap:9px; padding:10px 12px 6px; flex-wrap:wrap; }
.item-body  { flex:1; min-width:0; }
.item-name  { font-size:.85rem; color:rgba(255,255,255,.9); line-height:1.4; font-weight:500; }
.fin-item.completed .item-name { text-decoration:line-through; color:rgba(255,255,255,.38); }
.item-meta  { display:flex; gap:5px; margin-top:3px; flex-wrap:wrap; align-items:center; }
.item-actions { display:flex; align-items:center; gap:5px; flex-shrink:0; }

/* Debt note */
.debt-note {
  padding: 4px 12px 8px;
  font-size: 0.73rem; color: rgba(167,139,250,0.7);
  font-style: italic; border-top: 1px solid rgba(167,139,250,0.1);
  margin-top: 2px;
}

/* Amounts */
.item-amounts { padding:0 12px 8px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.amt-block { display:flex; flex-direction:column; gap:1px; }
.amt-label { font-size:.6rem; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:1px; }
.amt-val   { font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:700; }
.av-green  { color:var(--emerald-light); }
.av-teal   { color:var(--teal); }
.av-yellow { color:var(--yellow); }
.av-blue   { color:var(--blue); }
.av-purple { color:var(--purple); }
.amt-sep   { color:rgba(255,255,255,.12); font-size:.75rem; align-self:flex-end; margin-bottom:2px; }

/* Mini progress */
.mini-prog-wrap { padding:0 12px 9px; }
.mini-prog { height:3px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
.mini-prog-fill { height:100%; border-radius:2px; transition:width .4s; background:linear-gradient(90deg,var(--emerald),var(--teal)); }
.mini-prog-fill.pfull   { background:linear-gradient(90deg,var(--green),#86efac); }
.mini-prog-fill.pblue   { background:linear-gradient(90deg,#2563eb,#60a5fa); }
.mini-prog-fill.ppurple { background:linear-gradient(90deg,#7c3aed,#a78bfa); }
.mini-prog-fill.bfull   { background:linear-gradient(90deg,var(--green),#86efac); }

/* Abono row */
.abono-row { padding:2px 12px 9px; display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.abono-input {
  background:rgba(255,255,255,.06); border:1px solid rgba(52,211,153,.22);
  border-radius:8px; padding:5px 9px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:.78rem; outline:none; width:105px; transition:border-color .2s;
}
.abono-input:focus { border-color:var(--accent); }
.abono-input::placeholder { color:rgba(255,255,255,.22); }
.abono-btn {
  background:rgba(16,185,129,.13); border:1px solid rgba(52,211,153,.28);
  border-radius:8px; padding:5px 11px; color:var(--emerald-light);
  font-size:.72rem; cursor:pointer; transition:all .18s;
}
.abono-btn:hover  { background:rgba(16,185,129,.28); }
.abono-btn.blue   { background:rgba(96,165,250,.12); border-color:rgba(96,165,250,.28); color:var(--blue); }
.abono-btn.purple { background:rgba(167,139,250,.12); border-color:rgba(167,139,250,.28); color:var(--purple); }
.abono-btn.red    { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.28); color:var(--red); }

/* ── BADGES ─────────────────────────────────────── */
.badge { font-size:.65rem; padding:2px 7px; border-radius:6px; display:inline-flex; align-items:center; gap:3px; }
.b-ok     { background:rgba(52,211,153,.1); color:var(--emerald-light); }
.b-near   { background:rgba(251,191,36,.12); color:var(--yellow); }
.b-over   { background:rgba(248,113,113,.18); color:var(--red); }
.b-muerte { background:rgba(248,113,113,.18); color:var(--red); font-weight:700; }
.b-fixed  { background:rgba(245,158,11,.13); color:var(--gold); }
.b-timer  { background:rgba(74,222,128,.08); color:rgba(74,222,128,.65); font-size:.6rem; }
.b-date   { background:rgba(255,255,255,.07); color:rgba(255,255,255,.42); }
.b-blue   { background:rgba(96,165,250,.1); color:var(--blue); }
.b-purple { background:rgba(167,139,250,.1); color:var(--purple); }
.b-teal   { background:rgba(45,212,191,.1); color:var(--teal); }
.b-cat    { background:rgba(255,255,255,.06); color:rgba(255,255,255,.5); font-size:.6rem; }

/* ── ICON BUTTONS ──────────────────────────────── */
.icon-btn {
  width:26px; height:26px; border-radius:8px;
  border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03); color:rgba(255,255,255,.28);
  cursor:pointer; font-size:12px;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; flex-shrink:0;
}
.icon-btn.btn-fixed:hover, .icon-btn.btn-fixed.active { border-color:var(--gold); color:var(--gold); background:rgba(245,158,11,.12); }
.icon-btn.btn-del:hover { border-color:var(--red); color:var(--red); background:rgba(248,113,113,.1); }
.icon-btn.btn-edit:hover { border-color:var(--blue); color:var(--blue); background:rgba(96,165,250,.1); }
.icon-btn.btn-note:hover, .icon-btn.btn-note.has-note { border-color:var(--purple); color:var(--purple); background:rgba(167,139,250,.1); }
.icon-btn.btn-drag { cursor: grab; }
.icon-btn.btn-drag:hover { border-color: rgba(255,255,255,.3); color: rgba(255,255,255,.5); }

/* Checkbox circle */
.item-check {
  width:20px; height:20px; border-radius:50%;
  border:2px solid rgba(52,211,153,.35);
  background:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; transition:all .2s; flex-shrink:0; margin-top:1px;
}
.item-check:hover   { border-color:var(--green); background:rgba(74,222,128,.08); }
.item-check.checked { border-color:var(--green); background:rgba(74,222,128,.18); color:var(--green); }
.item-check.blue    { border-color:rgba(96,165,250,.4); }
.item-check.blue:hover, .item-check.blue.checked { border-color:var(--blue); background:rgba(96,165,250,.18); color:var(--blue); }
.item-check.purple  { border-color:rgba(167,139,250,.4); }
.item-check.purple:hover, .item-check.purple.checked { border-color:var(--purple); background:rgba(167,139,250,.18); color:var(--purple); }

/* ── ADD FORM ──────────────────────────────────── */
.add-form { display:flex; flex-direction:column; gap:7px; margin-top:auto; }
.add-row  { display:flex; gap:7px; }
.add-input {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid rgba(52,211,153,.22); border-radius:10px; padding:9px 13px;
  color:#fff; font-family:'DM Sans',sans-serif; font-size:.83rem; outline:none; transition:border-color .2s;
}
.add-input::placeholder { color:rgba(255,255,255,.25); }
.add-input:focus { border-color:var(--accent); }
.add-select {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid rgba(52,211,153,.22); border-radius:10px; padding:9px 13px;
  color:rgba(255,255,255,.7); font-family:'DM Sans',sans-serif; font-size:.83rem; outline:none; transition:border-color .2s;
  cursor:pointer;
}
.add-select:focus { border-color:var(--accent); }
.add-select option { background:#051a10; color:#fff; }
.add-input-sm {
  background:rgba(255,255,255,.06); border:1px solid rgba(52,211,153,.18);
  border-radius:9px; padding:7px 9px;
  color:rgba(255,255,255,.7); font-family:'DM Sans',sans-serif; font-size:.77rem;
  outline:none; transition:border-color .2s; width:105px; flex-shrink:0;
}
.add-input-sm:focus { border-color:var(--accent); }
.add-input-sm::-webkit-calendar-picker-indicator { filter:invert(.5); cursor:pointer; }
.add-label { font-size:.68rem; color:rgba(255,255,255,.3); align-self:center; white-space:nowrap; }
.add-btn {
  background:linear-gradient(135deg,var(--emerald-dark),var(--accent));
  border:none; border-radius:10px; padding:9px 15px;
  color:#fff; font-size:19px; cursor:pointer;
  transition:opacity .2s,transform .15s; line-height:1; flex-shrink:0;
}
.add-btn:hover  { opacity:.85; transform:scale(1.05); }
.add-btn:active { transform:scale(.96); }
.add-btn.blue   { background:linear-gradient(135deg,#1e3a5f,#3b82f6); }
.add-btn.purple { background:linear-gradient(135deg,#3b1f6b,#8b5cf6); }
.add-btn.teal   { background:linear-gradient(135deg,#065f46,#2dd4bf); }

.empty-state { text-align:center; padding:18px 0; color:rgba(255,255,255,.2); font-size:.8rem; font-style:italic; }

/* ── SEC DIVIDER ────────────────────────────────── */
.sec-divider {
  display:flex; align-items:center; gap:14px;
  margin:26px 0 14px;
  color:rgba(255,255,255,.18); font-size:.7rem; letter-spacing:2px; text-transform:uppercase;
}
.sec-divider::before,.sec-divider::after { content:''; flex:1; height:1px; background:rgba(52,211,153,.12); }

/* ── STATS BAR ─────────────────────────────────── */
.stats-bar {
  display:flex; justify-content:center; gap:28px; margin-top:22px; padding:18px;
  background:rgba(255,255,255,.025); border:1px solid rgba(52,211,153,.12); border-radius:16px; flex-wrap:wrap;
}
.stat { text-align:center; }
.stat-number { font-family:'DM Sans',sans-serif; font-size:1.5rem; font-weight:700; line-height:1; }
.sn-pay    { color:var(--red); }
.sn-goals  { color:var(--blue); }
.sn-debts  { color:var(--purple); }
.sn-paid   { color:var(--green); text-shadow:0 0 12px rgba(74,222,128,.45); }
.sn-acc    { color:var(--teal); }
.stat-label { font-size:.65rem; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.25); margin-top:4px; }

/* ── CLEAR ─────────────────────────────────────── */
.clear-wrap { text-align:center; margin-top:22px; }
.clear-btn {
  background:none; border:1px solid rgba(248,113,113,.22);
  color:rgba(248,113,113,.45); font-family:'DM Sans',sans-serif;
  font-size:.72rem; padding:7px 18px; border-radius:10px; cursor:pointer; transition:all .2s;
}
.clear-btn:hover { border-color:rgba(248,113,113,.6); color:#f87171; background:rgba(248,113,113,.07); }
.save-note { text-align:center; margin-top:12px; font-size:.7rem; color:rgba(255,255,255,.16); }
.save-note span { color:rgba(52,211,153,.45); }

/* ── TOAST ─────────────────────────────────────── */
.toast {
  position:fixed; bottom:26px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(5,26,16,.95); border:1px solid rgba(52,211,153,.28);
  color:var(--emerald-light); font-size:.8rem;
  padding:9px 22px; border-radius:30px; backdrop-filter:blur(12px);
  transition:transform .3s,opacity .3s; opacity:0; z-index:999; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ── MODAL ─────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(3,12,6,.82);
  backdrop-filter:blur(8px); z-index:900;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-box {
  background:rgba(5,22,13,.97); border:1px solid rgba(52,211,153,.28);
  border-radius:22px; padding:28px; width:540px; max-width:94vw;
  max-height:84vh; overflow-y:auto;
  transform:scale(.91); transition:transform .25s;
  scrollbar-width:thin; scrollbar-color:rgba(52,211,153,.2) transparent;
}
.modal-overlay.open .modal-box { transform:scale(1); }
.modal-title { font-family:'DM Sans',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:4px; color:var(--emerald-light); }
.modal-sub { font-size:.73rem; color:rgba(255,255,255,.32); margin-bottom:18px; }
